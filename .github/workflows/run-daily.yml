name: Run MeidiAuto Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

concurrency:
  group: meidiauto-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate pipeline prerequisites
        env:
          EMAIL_ADDRESS_QQ: ${{ secrets.EMAIL_ADDRESS_QQ }}
          EMAIL_PASSWORD_QQ: ${{ secrets.EMAIL_PASSWORD_QQ }}
          EMAIL_PASSWOR_QQ: ${{ secrets.EMAIL_PASSWOR_QQ }}
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
        run: python main.py --check

      - name: Run pipeline
        env:
          EMAIL_ADDRESS_QQ: ${{ secrets.EMAIL_ADDRESS_QQ }}
          EMAIL_PASSWORD_QQ: ${{ secrets.EMAIL_PASSWORD_QQ }}
          EMAIL_PASSWOR_QQ: ${{ secrets.EMAIL_PASSWOR_QQ }}
          IMAP_SERVER: ${{ secrets.IMAP_SERVER }}
        run: python main.py --data-dir data --stop-on-error --report-file data/run-report.json

      - name: Upload run report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-report
          path: data/run-report.json
          if-no-files-found: ignore
